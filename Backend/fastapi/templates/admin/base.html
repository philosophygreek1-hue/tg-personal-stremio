<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}My Videos Admin{% endblock %}</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #00b4d8;
    --accent2: #0077b6;
    --text: #e6edf3;
    --muted: #8b949e;
    --danger: #f85149;
    --success: #3fb950;
    --warn: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Nav */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; }
  .nav-brand { font-size: 1.2rem; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: .5rem; }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { color: var(--muted); font-size: .9rem; padding: .25rem 0; border-bottom: 2px solid transparent; }
  .nav-links a.active, .nav-links a:hover { color: var(--text); border-bottom-color: var(--accent); text-decoration: none; }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  .page-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--accent); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .4rem .9rem; border-radius: 6px; border: none; cursor: pointer; font-size: .85rem; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-sm { padding: .25rem .6rem; font-size: .78rem; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: .6rem 1rem; font-size: .8rem; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: .65rem 1rem; border-bottom: 1px solid var(--border); font-size: .88rem; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  /* Forms */
  input, select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: .4rem .75rem; font-size: .88rem; outline: none; }
  input:focus, select:focus { border-color: var(--accent); }
  .input-row { display: flex; gap: .5rem; align-items: center; }

  /* Badges */
  .badge { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .75rem; font-weight: 500; }
  .badge-folder { background: rgba(0,180,216,.15); color: var(--accent); }
  .badge-root { background: rgba(139,148,158,.15); color: var(--muted); }

  /* Stats row */
  .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.5rem; flex: 1; min-width: 140px; }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: .8rem; color: var(--muted); margin-top: .2rem; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; min-width: 340px; max-width: 480px; width: 90%; }
  .modal-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
  .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }
  .modal input, .modal select { width: 100%; margin-bottom: .75rem; }

  /* Toast */
  #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .75rem 1.25rem; font-size: .88rem; display: none; z-index: 200; }
  #toast.show { display: block; }
  #toast.ok { border-color: var(--success); color: var(--success); }
  #toast.err { border-color: var(--danger); color: var(--danger); }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <div class="nav-brand">▶ My Videos</div>
  <div class="nav-links">
    <a href="/admin" class="{% block nav_home %}{% endblock %}">Home</a>
    <a href="/media/manage" class="{% block nav_media %}{% endblock %}">Media</a>
  </div>
</nav>

{% block content %}{% endblock %}

<div id="toast"></div>
<script>
function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (ok ? 'ok' : 'err');
  setTimeout(() => t.className = '', 2500);
}
async function apiCall(url, method='POST', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
